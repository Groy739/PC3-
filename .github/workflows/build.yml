name: Build JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y empaquetar JAR
        run: mvn package -B --no-transfer-progress

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ProyectoFinalPC3-JAR
          path: target/ProyectoFinalProgra3-1.0-SNAPSHOT.jar
          retention-days: 30
